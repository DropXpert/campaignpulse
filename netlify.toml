[build]
  command = "npm run build"

[build.environment]
  NODE_VERSION = "22"
  NPM_FLAGS = "--legacy-peer-deps=false"
  SECRETS_SCAN_OMIT_KEYS = "ACE_API_BASE_URL,ACE_API_KEY,ACE_APP_ID,ACE_APP_ID_HEADER,ACE_IMAGE_API_KEY,ACE_IMAGE_APP_ID,ACE_IMAGE_ENDPOINT,ACE_IMAGE_MODEL,ACE_MUSIC_API_KEY,ACE_MUSIC_APP_ID,ACE_MUSIC_ENDPOINT,ACE_MUSIC_MODEL,ACE_VIDEO_API_KEY,ACE_VIDEO_APP_ID,ACE_VIDEO_ENDPOINT,ACE_VIDEO_MODEL,ACE_SEARCH_API_KEY,ACE_SEARCH_APP_ID,ACE_SEARCH_ENDPOINT,ACE_QR_API_KEY,ACE_QR_APP_ID,ACE_QR_ENDPOINT,ACE_PLATFORM_TOKEN,ACE_X402_ORDER_ID,ACE_X402_PRIVATE_KEY,DIFY_API_BASE_URL,DIFY_API_KEY,DIFY_APP_ID,DIFY_WORKFLOW_ID,DIFY_MODEL_LABEL,NEXT_PUBLIC_APP_NAME,NEXT_PUBLIC_APP_URL,MOCK_MODE,ALLOW_MOCK_FALLBACK"

[dev]
  command = "npm run dev"
  targetPort = 3000
  port = 8888
  framework = "next"
